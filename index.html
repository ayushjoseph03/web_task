<!DOCTYPE html>
<html>
<head>
    <title>DevOps CI/CD Dashboard</title>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;

    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;

    transition: 0.3s;
}

/* Header */

header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Card Container */

.container {
    margin-top: 40px;
}

/* Card Design */

.card {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    margin: 20px auto;
    width: 300px;

    border-radius: 12px;

    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);

    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Buttons */

button {

    padding: 12px 18px;
    margin: 10px;

    font-size: 15px;

    border: none;
    border-radius: 8px;

    cursor: pointer;

    background: #00c6ff;
    color: white;

    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

/* Clock */

#clock {
    font-size: 18px;
    margin-top: 15px;
}

/* Status */

#status {
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
}

/* Dark Mode */

.dark-mode {

    background: linear-gradient(135deg, #000000, #434343);
}

</style>

</head>

<body>

<header>
🚀 DevOps CI/CD Dashboard
</header>

<div class="container">

<div class="card">

<p>This webpage is deployed using GitHub CI/CD.</p>

<button onclick="showMessage()">
Run Pipeline
</button>

<button onclick="toggleDarkMode()">
Toggle Dark Mode
</button>

<button onclick="simulateDeploy()">
Simulate Deployment
</button>

<div id="clock"></div>

<div id="status">
Status: Waiting...
</div>

</div>

</div>

<script>

/* Alert Button */

function showMessage() {

alert("Pipeline Triggered Successfully!");

}

/* Dark Mode */

function toggleDarkMode() {

document.body.classList.toggle("dark-mode");

alert("Theme Changed!");

}

/* Live Clock */

function updateClock() {

const now = new Date();

document.getElementById("clock").innerText =
"Current Time: " + now.toLocaleTimeString();

}

setInterval(updateClock, 1000);

/* Deployment Simulator */

function simulateDeploy() {

alert("Deployment Started...");

document.getElementById("status").innerText =
"Status: Deploying...";

setTimeout(() => {

document.getElementById("status").innerText =
"Status: Deployment Successful!";

alert("Deployment Completed Successfully!");

}, 3000);

}

/* Page Load Alert */

window.onload = function() {

alert("Welcome! CI/CD Dashboard Loaded Successfully.");

}

</script>

</body>

</html>
